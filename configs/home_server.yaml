project:
  name: ASE-Evolutionary-Algorithm

paths:
  data_dir: ./data
  test_dir: ./tests
  models_dir: ./models

executables:
  gulp_dir: ~/Programs/gulp-6.4/Src/gulp

simulation:
  engine: mattersim

uspex:
  exe: USPEX

vasp:
  kpeg: /home/genesis/PycharmProjects/ASE-Evolutionary-Algorithm/data/runners/create_kpoints.sh
  vasp6: /home/genesis/PycharmProjects/ASE-Evolutionary-Algorithm/data/runners/run_vasp.sh
  cores: 4
  cpu_numbering: adjacent
#blocked if threads are(0,1) core 0, (2,3) core 1 - laptop cpu
#interleaved if threads are (0,128) core 0, (1,219) core 1 -AMD EPYC

mattersim:
  container_root: /home/genesis/PycharmProjects/container_cpu_2
  model_path: /home/genesis/PycharmProjects/container_cpu_2/models/tuned_mattersim_12.03.2026.pth
  device: cpu
  input_template: input_mattersim_d3_short.py
  n_threads: 4

env:
  conda_env: ase_env




